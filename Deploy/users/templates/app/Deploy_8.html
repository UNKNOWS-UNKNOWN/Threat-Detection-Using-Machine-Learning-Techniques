{% extends "users/base.html" %}
{% block title %} Login Page {% endblock title%}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Deployment</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Include your custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    
    <style>
        body {
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNxCwqrFG-dwFQefHYfWNyMkCMZ-c_dS9s5g&s');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Arial', sans-serif;
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin-top: 20px;
        }
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
        }
        .form-part {
            flex: 1;
            min-width: 400px;
            margin: 10px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            margin-right: 50px;
        }
        .form-part h3 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #ff4500;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #d84315;
        }
        center {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h2>Network Threat Detections</h2>
    <form action="{% url 'Deploy_8' %}" method="POST">
        {% csrf_token %}
        <div class="container">
            <!-- Part 1: First Side Inputs -->
            <div class="form-part">
                
                <div class="form-group">
                    <label for="flow_duration">Flow Duration:</label>
                    <input type="text" id="flow_duration" name="flow_duration" required>
                </div>
                <div class="form-group">
                    <label for="fwd_pkts_tot">Forward Packets Total:</label>
                    <input type="text" id="fwd_pkts_tot" name="fwd_pkts_tot" required>
                </div>
                <div class="form-group">
                    <label for="bwd_pkts_tot">Backward Packets Total:</label>
                    <input type="text" id="bwd_pkts_tot" name="bwd_pkts_tot" required>
                </div>
                <div class="form-group">
                    <label for="fwd_data_pkts_tot">Forward Data Packets Total:</label>
                    <input type="text" id="fwd_data_pkts_tot" name="fwd_data_pkts_tot" required>
                </div>
                <div class="form-group">
                    <label for="bwd_data_pkts_tot">Backward Data Packets Total:</label>
                    <input type="text" id="bwd_data_pkts_tot" name="bwd_data_pkts_tot" required>
                </div>
                <div class="form-group">
                    <label for="fwd_pkts_per_sec">Forward Packets per Second:</label>
                    <input type="text" id="fwd_pkts_per_sec" name="fwd_pkts_per_sec" required>
                </div>
                <div class="form-group">
                    <label for="bwd_pkts_per_sec">Backward Packets per Second:</label>
                    <input type="text" id="bwd_pkts_per_sec" name="bwd_pkts_per_sec" required>
                </div>
                <div class="form-group">
                    <label for="flow_pkts_per_sec">Flow Packets per Second:</label>
                    <input type="text" id="flow_pkts_per_sec" name="flow_pkts_per_sec" required>
                </div>
                <div class="form-group">
                    <label for="down_up_ratio">Down/Up Ratio:</label>
                    <input type="text" id="down_up_ratio" name="down_up_ratio" required>
                </div>
                <div class="form-group">
                    <label for="fwd_header_size_tot">Forward Header Size Total:</label>
                    <input type="text" id="fwd_header_size_tot" name="fwd_header_size_tot" required>
                </div>
                <div class="form-group">
                    <label for="fwd_header_size_min">Forward Header Size Minimum:</label>
                    <input type="text" id="fwd_header_size_min" name="fwd_header_size_min" required>
                </div>
                <div class="form-group">
                    <label for="fwd_header_size_max">Forward Header Size Maximum:</label>
                    <input type="text" id="fwd_header_size_max" name="fwd_header_size_max" required>
                </div>
                <div class="form-group">
                    <label for="bwd_header_size_tot">Backward Header Size Total:</label>
                    <input type="text" id="bwd_header_size_tot" name="bwd_header_size_tot" required>
                </div>
                <div class="form-group">
                    <label for="bwd_header_size_min">Backward Header Size Minimum:</label>
                    <input type="text" id="bwd_header_size_min" name="bwd_header_size_min" required>
                </div>
                <div class="form-group">
                    <label for="bwd_header_size_max">Backward Header Size Maximum:</label>
                    <input type="text" id="bwd_header_size_max" name="bwd_header_size_max" required>
                </div>
                <div class="form-group">
                    <label for="flow_FIN_flag_count">Flow FIN Flag Count:</label>
                    <input type="text" id="flow_FIN_flag_count" name="flow_FIN_flag_count" required>
                </div>
                <div class="form-group">
                    <label for="flow_SYN_flag_count">Flow SYN Flag Count:</label>
                    <input type="text" id="flow_SYN_flag_count" name="flow_SYN_flag_count" required>
                </div>
                <div class="form-group">
                    <label for="flow_RST_flag_count">Flow RST Flag Count:</label>
                    <input type="text" id="flow_RST_flag_count" name="flow_RST_flag_count" required>
                </div>
                <div class="form-group">
                    <label for="fwd_PSH_flag_count">Forward PSH Flag Count:</label>
                    <input type="text" id="fwd_PSH_flag_count" name="fwd_PSH_flag_count" required>
                </div>
                <div class="form-group">
                    <label for="bwd_PSH_flag_count">Backward PSH Flag Count:</label>
                    <input type="text" id="bwd_PSH_flag_count" name="bwd_PSH_flag_count" required>
                </div>
                <div class="form-group">
                    <label for="flow_ACK_flag_count">Flow ACK Flag Count:</label>
                    <input type="text" id="flow_ACK_flag_count" name="flow_ACK_flag_count" required>
                </div>
                <div class="form-group">
                    <label for="fwd_URG_flag_count">Forward URG Flag Count:</label>
                    <input type="text" id="fwd_URG_flag_count" name="fwd_URG_flag_count" required>
                </div>
                <div class="form-group">
                    <label for="bwd_URG_flag_count">Backward URG Flag Count:</label>
                    <input type="text" id="bwd_URG_flag_count" name="bwd_URG_flag_count" required>
                </div>
                <div class="form-group">
                    <label for="flow_CWR_flag_count">Flow CWR Flag Count:</label>
                    <input type="text" id="flow_CWR_flag_count" name="flow_CWR_flag_count" required>
                </div>
            </div>
            <!-- Part 2: Second Side Inputs -->
            <div class="form-part">
                
                
                
                
                <div class="form-group">
                    <label for="flow_ECE_flag_count">Flow ECE Flag Count:</label>
                    <input type="text" id="flow_ECE_flag_count" name="flow_ECE_flag_count" required>
                </div>
                <div class="form-group">
                    <label for="fwd_pkts_payload_min">Forward Packets Payload Minimum:</label>
                    <input type="text" id="fwd_pkts_payload_min" name="fwd_pkts_payload_min" required>
                </div>
                <div class="form-group">
                    <label for="fwd_pkts_payload_max">Forward Packets Payload Maximum:</label>
                    <input type="text" id="fwd_pkts_payload_max" name="fwd_pkts_payload_max" required>
                </div>
                <div class="form-group">
                    <label for="fwd_pkts_payload_tot">Forward Packets Payload Total:</label>
                    <input type="text" id="fwd_pkts_payload_tot" name="fwd_pkts_payload_tot" required>
                </div>
                <div class="form-group">
                    <label for="fwd_pkts_payload_avg">Forward Packets Payload Average:</label>
                    <input type="text" id="fwd_pkts_payload_avg" name="fwd_pkts_payload_avg" required>
                </div>
                <div class="form-group">
                    <label for="fwd_pkts_payload_std">Forward Packets Payload Standard Deviation:</label>
                    <input type="text" id="fwd_pkts_payload_std" name="fwd_pkts_payload_std" required>
                </div>
                <div class="form-group">
                    <label for="bwd_pkts_payload_min">Backward Packets Payload Minimum:</label>
                    <input type="text" id="bwd_pkts_payload_min" name="bwd_pkts_payload_min" required>
                </div>
                <div class="form-group">
                    <label for="bwd_pkts_payload_max">Backward Packets Payload Maximum:</label>
                    <input type="text" id="bwd_pkts_payload_max" name="bwd_pkts_payload_max" required>
                </div>
                <div class="form-group">
                    <label for="bwd_pkts_payload_tot">Backward Packets Payload Total:</label>
                    <input type="text" id="bwd_pkts_payload_tot" name="bwd_pkts_payload_tot" required>
                </div>
                <div class="form-group">
                    <label for="bwd_pkts_payload_avg">Backward Packets Payload Average:</label>
                    <input type="text" id="bwd_pkts_payload_avg" name="bwd_pkts_payload_avg" required>
                </div>
                <div class="form-group">
                    <label for="bwd_pkts_payload_std">Backward Packets Payload Standard Deviation:</label>
                    <input type="text" id="bwd_pkts_payload_std" name="bwd_pkts_payload_std" required>
                </div>
                <div class="form-group">
                    <label for="flow_pkts_payload_min">Flow Packets Payload Minimum:</label>
                    <input type="text" id="flow_pkts_payload_min" name="flow_pkts_payload_min" required>
                </div>
                <div class="form-group">
                    <label for="flow_pkts_payload_max">Flow Packets Payload Maximum:</label>
                    <input type="text" id="flow_pkts_payload_max" name="flow_pkts_payload_max" required>
                </div>
                <div class="form-group">
                    <label for="flow_pkts_payload_tot">Flow Packets Payload Total:</label>
                    <input type="text" id="flow_pkts_payload_tot" name="flow_pkts_payload_tot" required>
                </div>
                <div class="form-group">
                    <label for="flow_pkts_payload_avg">Flow Packets Payload Average:</label>
                    <input type="text" id="flow_pkts_payload_avg" name="flow_pkts_payload_avg" required>
                </div>
                <div class="form-group">
                    <label for="flow_pkts_payload_std">Flow Packets Payload Standard Deviation:</label>
                    <input type="text" id="flow_pkts_payload_std" name="flow_pkts_payload_std" required>
                </div>
                <div class="form-group">
                    <label for="fwd_bulk_packets">Forward Bulk Packets:</label>
                    <input type="text" id="fwd_bulk_packets" name="fwd_bulk_packets" required>
                </div>
                <div class="form-group">
                    <label for="bwd_bulk_packets">Backward Bulk Packets:</label>
                    <input type="text" id="bwd_bulk_packets" name="bwd_bulk_packets" required>
                </div>
                <div class="form-group">
                    <label for="fwd_bulk_rate">Forward Bulk Rate:</label>
                    <input type="text" id="fwd_bulk_rate" name="fwd_bulk_rate" required>
                </div>
                <div class="form-group">
                    <label for="bwd_bulk_rate">Backward Bulk Rate:</label>
                    <input type="text" id="bwd_bulk_rate" name="bwd_bulk_rate" required>
                </div>
                <div class="form-group">
                    <label for="fwd_init_window_size">Forward Initial Window Size:</label>
                    <input type="text" id="fwd_init_window_size" name="fwd_init_window_size" required>
                </div>
                <div class="form-group">
                    <label for="bwd_init_window_size">Backward Initial Window Size:</label>
                    <input type="text" id="bwd_init_window_size" name="bwd_init_window_size" required>
                </div>
                <div class="form-group">
                    <label for="fwd_last_window_size">Forward Last Window Size:</label>
                    <input type="text" id="fwd_last_window_size" name="fwd_last_window_size" required>
                </div>
            </div>
        </div>
        <center>
            <button type="submit">Predict</button>
            <h1 style="font-size: 18px;">{{ prediction_text }}</h1>
        </center>
    </form>
</body>
</html>
{% endblock content %}
